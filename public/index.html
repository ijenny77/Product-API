<!DOCTYPE html>
<html>
<head>
<title>Products</title>
</head>
<style>
    body{
        background-color: rgb(212, 211, 211);
    }
    h1{
        text-align: center;
        margin-top: 7rem;
    }
    .product-box{
        border: 1px solid black;
        border-radius: 5px;
        width: 20%;
        margin: 2rem auto;
        padding: 1.4rem;
        background-color: rgb(168, 168, 170);
    }
    li{
        margin-bottom: 0.5rem;
    }
    #add{
        background-color: black;
        border-radius: 5px;
        color: white;
        margin-top: 0.5rem;
        width:30%;
    }
    input{
        border-radius: 3px;
        background-color: rgb(201, 199, 199);
    }
</style>

<body>
<h1>Product Manager</h1>
<div class="product-box">
    <h2>Products</h2>

    <ul id="products"></ul>

    <h3>Add Product</h3>

    <input id="name" placeholder="Name">
    <input id="price" placeholder="Price">
    <button id="add" onclick="addProduct()">Add</button>
</div>

<script>

const API = "http://localhost:3000/products"
const list = document.getElementById("products")

// Load products
function loadProducts(){
  fetch(API)
  .then(res => res.json())
  .then(products => {
    list.innerHTML = products.map(p => `
      <li>
        ${p.name} - ${p.price}
        <button style="border:1px solid blue;border-radius:3px; background-color:blue;color:white" onclick="editProduct(${p.id},'${p.name}','${p.price}')">Edit</button>
        <button style="border:1px solid red; border-radius:3px; background-color:red;color:white" onclick="deleteProduct(${p.id})">Delete</button>
      </li>
    `).join("")
  })
}

// Add product
function addProduct(){
  const name = document.getElementById("name").value
  const price = document.getElementById("price").value

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,price})
  }).then(loadProducts)
}

// Delete product
function deleteProduct(id){
  fetch(API+"/"+id,{method:"DELETE"})
  .then(loadProducts)
}

// Edit product
function editProduct(id,name,price){
  const newName = prompt("New name:",name)
  const newPrice = prompt("New price:",price)

  fetch(API+"/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:newName,price:newPrice})
  }).then(loadProducts)
}

loadProducts()

</script>

</body>
</html>
